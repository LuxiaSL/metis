# Metis self-play training — v8 (2026-04-07)
# Active run config. Use with: bash scripts/launch.sh configs/selfplay_v8.yaml

# ── Model ───────────────────────────────────────────────────────────
model:
  size: medium                    # 36M params, D=512, 12 layers
  attn_res_boundaries: "0,1,3,9" # Block boundaries: [1, 2, 6, 3] layers
  activation_checkpointing: true
  compile: true                   # torch.compile (fused kernels, ~44% speedup)

# ── Self-play ───────────────────────────────────────────────────────
self_play:
  num_workers: 96
  num_parallel_games: 96
  mcts_simulations: 400           # Doubled from 200 for stronger signal
  games_per_iter: 128
  max_moves: 200
  num_virtual_leaves: 8
  temperature_threshold: 200      # Full-game exploration (was 30)
  dirichlet_epsilon: 0.4          # More root noise (was 0.25)
  # Material adjudication: at max_moves, if |material_diff| > 3,
  # declare winner. Provides value signal from iteration 0.
  # Threshold configurable in self_play.py:_material_adjudicate()

# ── Training ────────────────────────────────────────────────────────
training:
  batch_size: 32                  # VRAM-limited (vLLM co-location)
  train_steps_per_iter: 1000
  num_iterations: 200
  gradient_clip: 1.0
  buffer_size: 1000000

# ── Evaluation ──────────────────────────────────────────────────────
eval:
  eval_every: 5
  eval_games_per_depth: 10
  eval_mcts_sims: 200
  eval_depths: "1,3,5"

# ── Monitoring ──────────────────────────────────────────────────────
monitoring:
  monitor: true
  monitor_tier1_every: 500
  monitor_tier2_every: 5000

# ── Checkpointing ──────────────────────────────────────────────────
checkpoint:
  save_every: 5
  checkpoint_dir: checkpoints/selfplay
  resume: true

# ── NCA Bootstrap ───────────────────────────────────────────────────
nca:
  nca_bootstrap: true             # Load NCA checkpoint if available

# ── Infrastructure ──────────────────────────────────────────────────
infra:
  node: node1
  gpu: 7
  stockfish_path: ~/luxi-files/bin/stockfish
  wandb: true
  wandb_entity: aethera
  wandb_project: metis
