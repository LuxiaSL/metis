# Chess engine training configuration
# These are reference values — CLI args override everything

# ── Self-play ──────────────────────────────────────────────────────────
self_play:
  num_parallel_games: 64      # Parallel MCTS games per generation
  mcts_simulations: 800       # Simulations per move
  games_per_iteration: 256    # Games generated per training iteration
  temperature: 1.0            # Move selection temperature (early game)
  temperature_threshold: 30   # Ply after which to play greedy
  max_moves: 512              # Draw if exceeded

# ── Training ──────────────────────────────────────────────────────────
training:
  num_iterations: 1000
  train_steps_per_iteration: 1000
  batch_size: 256
  gradient_clip: 1.0
  replay_buffer_size: 1_000_000

# ── Optimizer ─────────────────────────────────────────────────────────
# Muon for 2D weight matrices (~98% of params)
muon:
  lr: 0.02                    # Lower than language pretraining (RL is noisier)
  momentum: 0.95
  weight_decay: 0.01
  ns_iterations: 5
  ns_coefficients: "gram_ns"

# AdamW for embeddings, norms, heads (~2% of params)
adamw:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

# ── Schedule ──────────────────────────────────────────────────────────
schedule:
  warmup_steps: 500
  # No decay — train until convergence, manually decay if Elo plateaus

# ── Evaluation ────────────────────────────────────────────────────────
eval:
  eval_every: 10              # Iterations between Stockfish gauntlets
  stockfish_depths: [1, 3, 5]
  games_per_depth: 20
  mcts_simulations: 400       # Fewer sims for eval speed

# ── Monitoring ────────────────────────────────────────────────────────
monitoring:
  tier1_every: 500            # Training steps between Tier 1 metrics
  tier2_every: 5000           # Training steps between Tier 2 metrics

# ── Checkpointing ────────────────────────────────────────────────────
checkpoint:
  save_every: 10              # Iterations between saves
  checkpoint_dir: "checkpoints"

# ── NCA Bootstrap (Phase 0) ──────────────────────────────────────────
nca:
  enabled: false              # Set to true to run NCA pre-training
  num_rules: 2000
  sims_per_rule: 8
  num_steps: 128
  burn_in: 10
  max_pairs: 2_000_000        # ~134M tokens worth of frame pairs
  training_steps: 10000
  batch_size: 256
  lr: 3.0e-4
