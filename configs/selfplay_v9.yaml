# Metis self-play training — v9 (2026-04-07)
# Node2 full B200 config. Key changes from v8:
#   - batch_size 32 → 1024 (full GPU, no vLLM co-location)
#   - activation_checkpointing OFF (192GB VRAM, no need)
#   - temperature_threshold 200 → 30 (standard AlphaZero, cleaner value targets)
#   - dirichlet_epsilon 0.4 → 0.25 (standard, with temp 30 providing enough exploration)
#   - games_per_iter 128 → 256 (more data per iteration)
#   - num_parallel_games 96 → 192 (bigger inference batches with full GPU)
#   - mcts_simulations 400 → 800 (stronger signal, we have the throughput)
#   - eval_games_per_depth 10 → 20 (less noisy eval signal)
#
# Use with: bash scripts/launch.sh configs/selfplay_v9.yaml

# ── Model ───────────────────────────────────────────────────────────
model:
  size: medium                    # 36M params, D=512, 12 layers
  attn_res_boundaries: "0,1,3,9" # Block boundaries: [1, 2, 6, 3] layers
  activation_checkpointing: false # Full B200: no need to trade compute for VRAM
  compile: true                   # torch.compile (fused kernels, ~44% speedup)

# ── Self-play ───────────────────────────────────────────────────────
self_play:
  num_workers: 96
  num_parallel_games: 192         # Up from 96: larger inference batches, full GPU
  mcts_simulations: 800           # Doubled from 400: stronger training signal
  games_per_iter: 256             # Up from 128: more data per iteration
  max_moves: 200
  num_virtual_leaves: 8
  temperature_threshold: 30       # Standard AlphaZero: explore early, exploit late
  dirichlet_epsilon: 0.25         # Standard with temp 30

# ── Training ────────────────────────────────────────────────────────
training:
  batch_size: 1024                # Full B200: 192GB VRAM, no co-location constraint
  train_steps_per_iter: 1000
  num_iterations: 200
  gradient_clip: 1.0
  buffer_size: 1000000

# ── Evaluation ──────────────────────────────────────────────────────
eval:
  eval_every: 5
  eval_games_per_depth: 20        # Up from 10: less noisy eval
  eval_mcts_sims: 400             # Up from 200: stronger eval play
  eval_depths: "1,3,5"

# ── Monitoring ──────────────────────────────────────────────────────
monitoring:
  monitor: true
  monitor_tier1_every: 500
  monitor_tier2_every: 5000

# ── Checkpointing ──────────────────────────────────────────────────
checkpoint:
  save_every: 5
  checkpoint_dir: checkpoints/selfplay
  resume: false                   # Fresh start (stale checkpoints cleaned)

# ── NCA Bootstrap ───────────────────────────────────────────────────
nca:
  nca_bootstrap: true             # Load NCA checkpoint if available

# ── Infrastructure ──────────────────────────────────────────────────
infra:
  node: node2
  gpu: 0                          # Any GPU — all 8 free on node2
  stockfish_path: ~/luxi-files/bin/stockfish
  wandb: true
  wandb_entity: aethera
  wandb_project: metis
  wandb_name: metis-athena
